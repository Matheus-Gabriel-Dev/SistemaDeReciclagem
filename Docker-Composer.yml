version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-reciclagem
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reciclagem_db
      MYSQL_USER: user
      MYSQL_PASSWORD: user123
    ports:
      - "3306:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d